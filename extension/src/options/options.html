<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoCookie Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div id="app">
      <h1>NoCookie Options</h1>

      <nav class="tabs" role="tablist" aria-label="Options sections">
        <button
          role="tab"
          aria-selected="true"
          aria-controls="panel-preferences"
          id="tab-preferences"
          tabindex="0"
        >
          Preferences
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-overrides"
          id="tab-overrides"
          tabindex="-1"
        >
          Site Overrides
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-advanced"
          id="tab-advanced"
          tabindex="-1"
        >
          Advanced
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-statistics"
          id="tab-statistics"
          tabindex="-1"
        >
          Statistics
        </button>
        <button
          role="tab"
          aria-selected="false"
          aria-controls="panel-about"
          id="tab-about"
          tabindex="-1"
        >
          About
        </button>
      </nav>

      <div role="tabpanel" id="panel-preferences" aria-labelledby="tab-preferences">
        <section class="profile-section">
          <label for="profile-select">Profile</label>
          <select id="profile-select"></select>
        </section>

        <section id="categories-list" class="categories-section">
          <!-- Populated by options.ts -->
        </section>
      </div>

      <div role="tabpanel" id="panel-overrides" aria-labelledby="tab-overrides" hidden>
        <button id="add-override" class="btn-primary">+ Add Override</button>
        <table id="overrides-table">
          <thead>
            <tr>
              <th>Domain</th>
              <th>Mode</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Dynamic rows rendered by options-overrides.ts -->
          </tbody>
        </table>

        <dialog id="override-modal">
          <form method="dialog">
            <h3 class="modal-title">Site Override</h3>
            <label class="modal-field">
              Domain
              <input type="text" id="override-domain" placeholder="example.com" required />
            </label>
            <label class="modal-field">
              Mode
              <select id="override-mode">
                <option value="whitelist">Accept All</option>
                <option value="blacklist">Reject All</option>
                <option value="custom">Custom</option>
                <option value="disabled">Disabled</option>
              </select>
            </label>
            <div id="custom-prefs" hidden>
              <!-- Custom toggles built by options-overrides.ts -->
            </div>
            <div class="modal-actions">
              <button type="submit" class="btn-primary">Save</button>
              <button type="button" id="cancel-override" class="btn-secondary">Cancel</button>
            </div>
          </form>
        </dialog>
      </div>

      <div role="tabpanel" id="panel-advanced" aria-labelledby="tab-advanced" hidden>
        <!-- Built dynamically by options-advanced.ts -->
      </div>

      <div role="tabpanel" id="panel-statistics" aria-labelledby="tab-statistics" hidden>
        <!-- Built dynamically by options-stats.ts -->
      </div>

      <div role="tabpanel" id="panel-about" aria-labelledby="tab-about" hidden>
        <!-- Built dynamically by options-about.ts -->
      </div>
    </div>
    <script type="module" src="options.ts"></script>
  </body>
</html>
