<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoCookie</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="popup-header">
        <h1 class="popup-title">NoCookie</h1>
        <button id="settings-btn" class="icon-btn" aria-label="Open settings" title="Open settings">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path
              d="M9 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M14.7 11.1l.9 1.5a.75.75 0 01-.3 1l-1.2.7a6.4 6.4 0 01-.6 1l.3 1.4a.75.75 0 01-.6.9l-1.4.2a6 6 0 01-.9.5l-.9-1a7 7 0 01-1.2 0l-.9 1a6 6 0 01-.9-.5L5.7 16a.75.75 0 01-.6-.9l.3-1.4a6 6 0 01-.6-1L3.6 13a.75.75 0 01-.3-1l.9-1.5a6 6 0 010-1.2l-.9-1.4a.75.75 0 01.3-1l1.2-.7a6 6 0 01.6-1L5.1 3a.75.75 0 01.6-.9l1.4-.2a6 6 0 01.9-.5l.9 1a7 7 0 011.2 0l.9-1a6 6 0 01.9.5l1.4.2a.75.75 0 01.6.9l-.3 1.4a6 6 0 01.6 1l1.2.6a.75.75 0 01.3 1l-.9 1.5a6 6 0 010 1.2z"
              stroke="currentColor"
              stroke-width="1.5"
            />
          </svg>
        </button>
      </header>

      <p id="domain" class="domain-text"></p>

      <section id="status-section" class="status-section" aria-live="polite">
        <span id="status-icon" class="status-icon" aria-hidden="true"></span>
        <div class="status-text">
          <span id="status-label" class="status-label"></span>
          <span id="status-detail" class="status-detail"></span>
        </div>
      </section>

      <section id="categories-section" class="categories-section" aria-label="Cookie categories">
        <h2 class="section-heading">Categories</h2>
        <ul id="categories-list" class="categories-list" role="list"></ul>
      </section>

      <section class="profile-section">
        <label for="profile-select" class="section-heading">Profile</label>
        <select id="profile-select" class="profile-select"></select>
      </section>

      <footer class="popup-footer">
        <a id="override-link" href="#" class="footer-link">Override for this site</a>
        <a id="history-link" href="#" class="footer-link">View consent history</a>
      </footer>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
